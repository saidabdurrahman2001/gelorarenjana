<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Database Angkatan</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 30px 20px;
        }

        .header {
            max-width: 1200px;
            margin: 0 auto 40px;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            animation: slideDown 0.6s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header h1 {
            color: #333;
            margin-bottom: 25px;
            font-size: 2em;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .search-container {
            margin-bottom: 25px;
        }

        .search-container input {
            width: 100%;
            padding: 12px 20px;
            font-size: 1em;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .search-container input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.3);
        }

        .search-container input::placeholder {
            color: #999;
        }

        .filter-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 10px 25px;
            font-size: 1em;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .filter-btn:hover {
            background: #f0f0f0;
            transform: translateY(-2px);
        }

        .filter-btn.active {
            background: #667eea;
            color: white;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            animation: slideUp 0.8s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            cursor: pointer;
            border-left: 5px solid #667eea;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.15);
        }

        .card.kelas-A {
            border-left-color: #667eea;
        }

        .card.kelas-B {
            border-left-color: #f093fb;
        }

        .card.kelas-C {
            border-left-color: #4facfe;
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .card-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5em;
            font-weight: bold;
            object-fit: cover;
            overflow: hidden;
        }

        .card-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-info h3 {
            color: #333;
            margin-bottom: 5px;
        }

        .card-info .kelas {
            color: #667eea;
            font-size: 0.85em;
            font-weight: 600;
        }

        .card-details {
            border-top: 1px solid #f0f0f0;
            padding-top: 15px;
            font-size: 0.9em;
            color: #666;
        }

        .card-details p {
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .no-results {
            text-align: center;
            padding: 60px 20px;
            color: white;
            font-size: 1.2em;
        }

        .no-results svg {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            opacity: 0.7;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .header {
                padding: 20px;
            }

            .header h1 {
                font-size: 1.5em;
            }

            .cards-grid {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
                gap: 15px;
            }

            .filter-buttons {
                gap: 8px;
            }

            .filter-btn {
                padding: 8px 15px;
                font-size: 0.9em;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 15px;
            }

            .cards-grid {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 1.3em;
            }
        }

        /* Modal Styles */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            z-index: 1000;
            animation: fadeIn 0.4s ease-out;
        }

        .modal-overlay.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 60px 50px;
            max-width: 600px;
            width: 95%;
            max-height: 90vh;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.4);
            position: relative;
            animation: slideInUp 0.5s ease-out;
            overflow-y: auto;
        }

        .modal-close {
            position: absolute;
            top: 25px;
            right: 25px;
            width: 45px;
            height: 45px;
            background: #f0f0f0;
            border: none;
            border-radius: 50%;
            font-size: 1.8em;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            color: #333;
        }

        .modal-close:hover {
            background: #667eea;
            color: white;
            transform: rotate(90deg) scale(1.1);
        }

        .modal-avatar-lg {
            width: 200px;
            height: 200px;
            margin: 0 auto 35px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 4em;
            font-weight: bold;
            box-shadow: 0 15px 50px rgba(102, 126, 234, 0.4);
            animation: avatarZoom 0.6s ease-out;
            overflow: hidden;
        }

        .modal-avatar-lg img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .modal-header {
            text-align: center;
            margin-bottom: 35px;
            border-bottom: 3px solid #f0f0f0;
            padding-bottom: 25px;
        }

        .modal-header h2 {
            color: #333;
            font-size: 2.2em;
            margin-bottom: 15px;
            letter-spacing: -0.5px;
        }

        .modal-header .kelas-badge {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 35px;
            border-radius: 25px;
            font-weight: 700;
            font-size: 1.1em;
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.3);
        }

        .modal-details {
            margin-bottom: 35px;
        }

        .modal-details p {
            font-size: 1.05em;
            color: #555;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        .modal-details p:hover {
            background: #f0f0f0;
            transform: translateX(5px);
        }

        .modal-details .label {
            font-weight: 700;
            color: #667eea;
            min-width: 80px;
            font-size: 1.2em;
        }

        .modal-action {
            text-align: center;
        }

        .modal-action button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 50px;
            border: none;
            border-radius: 10px;
            font-size: 1.05em;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        }

        .modal-action button:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.5);
        }

        .modal-action button:active {
            transform: translateY(-1px);
        }

        @media (max-width: 768px) {
            .modal-content {
                padding: 40px 30px;
                max-width: 90vw;
            }

            .modal-header h2 {
                font-size: 1.8em;
            }

            .modal-avatar-lg {
                width: 160px;
                height: 160px;
                font-size: 3em;
            }

            .modal-close {
                width: 40px;
                height: 40px;
                font-size: 1.5em;
                top: 15px;
                right: 15px;
            }
        }

        @media (max-width: 480px) {
            .modal-content {
                padding: 30px 20px;
                width: 95vw;
            }

            .modal-header h2 {
                font-size: 1.5em;
            }

            .modal-avatar-lg {
                width: 130px;
                height: 130px;
                font-size: 2.5em;
                margin-bottom: 20px;
            }

            .modal-details p {
                font-size: 0.95em;
                padding: 12px;
                margin-bottom: 15px;
            }

            .modal-action button {
                padding: 12px 30px;
                font-size: 0.95em;
            }
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(80px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes avatarZoom {
            from {
                opacity: 0;
                transform: scale(0.5);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📚 Database Angkatan Gelora Renjana</h1>
        
        <div class="search-container">
            <input 
                type="text" 
                id="searchInput" 
                placeholder="🔍 Cari nama anggota..."
            >
        </div>

        <div class="filter-buttons">
            <button class="filter-btn active" onclick="filterByClass('all')">Semua</button>
            <button class="filter-btn" onclick="filterByClass('A')">Kelas A</button>
            <button class="filter-btn" onclick="filterByClass('B')">Kelas B</button>
            <button class="filter-btn" onclick="filterByClass('C')">Kelas C</button>
        </div>
    </div>

    <div class="container">
        <div class="cards-grid" id="cardsContainer">
            <!-- Cards akan ditampilkan di sini -->
        </div>
        <div id="noResults" class="no-results" style="display: none;">
            Tidak ada hasil yang ditemukan 😢
        </div>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">&times;</button>
            <div class="modal-avatar-lg" id="modalAvatar"></div>
            <div class="modal-header">
                <h2 id="modalName"></h2>
                <span class="kelas-badge" id="modalKelas"></span>
            </div>
            <div class="modal-details">
                <p>
                    <span class="label">🆔 NIP:</span>
                    <span id="modalNIP"></span>
                </p>
                <p>
                    <span class="label">👤 Gender:</span>
                    <span id="modalGender"></span>
                </p>
                <p>
                    <span class="label">🎓 Program Studi:</span>
                    <span id="modalProdi"></span>
                </p>
                <p>
                    <span class="label">🏫 Universitas:</span>
                    <span id="modalUniversity"></span>
                </p>
                <p>
                    <span class="label">📱 Instagram:</span>
                    <span id="modalIG"></span>
                </p>
                <p>
                    <span class="label">💬 No WA:</span>
                    <span id="modalWA"></span>
                </p>
            </div>
            <div class="modal-action">
                <button onclick="closeModal()">Tutup</button>
            </div>
        </div>
    </div>

    <script>
        // Fetch data dari data2.json
        let anggota = [];

        // Load data dari JSON file
        async function loadData() {
            try {
                const response = await fetch('data2.json');
                anggota = await response.json();
                filteredAnggota = anggota;
                renderCards(anggota);
            } catch (error) {
                console.error('Error loading data:', error);
                alert('Gagal memuat data. Pastikan file data2.json tersedia.');
            }
        }

        let filteredAnggota = anggota;
        let currentFilter = 'all';

        // Render Cards
        function renderCards(data) {
            const container = document.getElementById('cardsContainer');
            const noResults = document.getElementById('noResults');

            if (data.length === 0) {
                container.innerHTML = '';
                noResults.style.display = 'block';
                return;
            }

            noResults.style.display = 'none';
            container.innerHTML = data.map((item, index) => {
                const namaAwal = item['Nama Peserta'].split(' ')[0].substring(0, 2).toUpperCase();
                return `
                <div class="card kelas-${item.Kelas}" onclick="openModal('${item.NIP}')" data-nip="${item.NIP}">
                    <div class="card-header">
                        <div class="card-avatar">
                            ${item.Image && item.Image !== '-' ? `<img src="${item.Image}" alt="${item['Nama Peserta']}">` : namaAwal}
                        </div>
                        <div class="card-info">
                            <h3>${item['Nama Peserta']}</h3>
                            <div class="kelas">Kelas ${item.Kelas}</div>
                        </div>
                    </div>
                    <div class="card-details">
                        <p>🎓 ${item['Program Studi']}</p>
                        <p>🏫 ${item['Nama Perguruan Tinggi']}</p>
                    </div>
                </div>
            `;
            }).join('');
        }

        // Filter by Class
        function filterByClass(kelas) {
            currentFilter = kelas;
            updateFilterButtons();
            applyFilters();
        }

        // Update Filter Buttons UI
        function updateFilterButtons() {
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
        }

        // Apply Filters (Class + Search)
        function applyFilters() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            
            filteredAnggota = anggota.filter(item => {
                const matchClass = currentFilter === 'all' || item.Kelas === currentFilter;
                const matchSearch = item['Nama Peserta'].toLowerCase().includes(searchTerm);
                return matchClass && matchSearch;
            });

            renderCards(filteredAnggota);
        }

        // Search Event Listener
        document.getElementById('searchInput').addEventListener('keyup', applyFilters);

        // Modal Functions
        function openModal(nip) {
            const anggotaData = anggota.find(item => item.NIP === nip);
            
            if (anggotaData) {
                const namaAwal = anggotaData['Nama Peserta'].split(' ')[0].substring(0, 2).toUpperCase();
                document.getElementById('modalName').textContent = anggotaData['Nama Peserta'];
                document.getElementById('modalKelas').textContent = `Kelas ${anggotaData.Kelas}`;
                document.getElementById('modalNIP').textContent = anggotaData.NIP;
                document.getElementById('modalGender').textContent = anggotaData['Jenis Kelamin'];
                document.getElementById('modalUniversity').textContent = anggotaData['Nama Perguruan Tinggi'];
                document.getElementById('modalProdi').textContent = anggotaData['Program Studi'];
                document.getElementById('modalIG').textContent = anggotaData.IG !== '-' ? anggotaData.IG : 'Tidak tersedia';
                document.getElementById('modalWA').textContent = anggotaData['No WA'] !== '-' ? anggotaData['No WA'] : 'Tidak tersedia';
                
                const avatarElement = document.getElementById('modalAvatar');
                if (anggotaData.Image && anggotaData.Image !== '-') {
                    avatarElement.innerHTML = `<img src="${anggotaData.Image}" alt="${anggotaData['Nama Peserta']}">`;
                } else {
                    avatarElement.innerHTML = namaAwal;
                }
                
                const overlay = document.getElementById('modalOverlay');
                overlay.classList.add('active');
            }
        }

        function closeModal() {
            const overlay = document.getElementById('modalOverlay');
            overlay.classList.remove('active');
        }

        // Close modal when clicking outside the modal content
        document.getElementById('modalOverlay').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });

        // Close modal with Escape key
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeModal();
            }
        });

        // Load data on page load
        window.addEventListener('DOMContentLoaded', loadData);
    </script>
</body>
</html>
