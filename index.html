<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 60px 40px;
            max-width: 600px;
            text-align: center;
            animation: slideUp 0.8s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            color: #333;
            font-size: 2.5em;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        p {
            color: #666;
            font-size: 1.1em;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 30px;
            font-size: 1em;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            border: 2px solid #667eea;
        }

        .btn-secondary:hover {
            background: #667eea;
            color: white;
            transform: translateY(-3px);
        }

        .emoji {
            font-size: 3em;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="emoji">�</div>
        <h1>Hey Diana! 👋</h1>
        <p>
            Welcome to this special page... just for you! 😄<br><br>
            We both know you're amazing at everything, 
            but let's be real - your terrible jokes are legendary. 
            Your fashion sense? 🦸‍♀️
        </p>
        <div class="button-group">
            <button class="btn-primary" onclick="teaseMore()">More Teasing 😂</button>
            <button class="btn-secondary" onclick="compliment()">Say Something Nice 💕</button>
        </div>
        <div id="message" style="margin-top: 30px; font-size: 1.2em; color: #764ba2; font-weight: 600; min-height: 30px;"></div>
    </div>

    <script>
        function teaseMore() {
            const teases = [
                "kayaknya shazam juga gak bisa nebak lagu yang kamu nyanyiin deh! 🎤",
                "kadang aku bingung pacaran sama cewek apa abang abang 👽",
                "Kasihan Google Maps kalau kamu yang bawa, pasti Maps-nya yang pusing muter-muter! 😅",
                "Aku tau lifepath number kamu 5... tapi apa boleh senapsuan itu sama aku? 🤔",
                "Cewek lain takut kecoa, kamu mah kayaknya kecoanya yang takut sama kegarangan kamu! 🐜"
            ];
            const randomTease = teases[Math.floor(Math.random() * teases.length)];
            document.getElementById('message').textContent = randomTease;
        }

        function compliment() {
            const compliments = [
                "Just kidding - you're actually amazing! 💖",
                "Your smile makes my day 100x better ✨",
                "You're the most beautiful & brilliant person I know 👑",
                "I'm so lucky to have you in my life 💕",
                "You inspire me every single day 🌟",
                "You're my favorite person in the whole world 💕"
            ];
            const randomCompliment = compliments[Math.floor(Math.random() * compliments.length)];
            document.getElementById('message').textContent = randomCompliment;
        }
    </script>
</body>
</html>
